<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RideGo — Your Ride, Your Way</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
</head>
<body class="auth-page">

  <!-- Animated background -->
  <div class="bg-grid"></div>
  <div class="bg-blob blob-1"></div>
  <div class="bg-blob blob-2"></div>
  <div class="bg-blob blob-3"></div>

  <div class="auth-container">
    <!-- Brand -->
    <div class="brand">
      <div class="brand-icon">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <circle cx="14" cy="14" r="13" stroke="currentColor" stroke-width="2"/>
          <path d="M8 18 L14 8 L20 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="14" cy="18" r="2" fill="currentColor"/>
        </svg>
      </div>
      <span class="brand-name">RideGo</span>
    </div>

    <!-- Tab switcher -->
    <div class="auth-tabs">
      <button class="tab-btn active" data-tab="login">Sign In</button>
      <button class="tab-btn" data-tab="register">Create Account</button>
    </div>

    <!-- Login Form -->
    <div class="auth-form" id="login-form">
      <div class="form-header">
        <h1>Welcome back</h1>
        <p>Sign in to continue your journey</p>
      </div>

      <div class="alert" id="login-alert"></div>

      <div class="field">
        <label for="login-username">Username</label>
        <input type="text" id="login-username" placeholder="your_username" autocomplete="username" />
      </div>
      <div class="field">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" />
      </div>

      <button class="btn-primary" id="login-btn">
        <span class="btn-text">Sign In</span>
        <span class="btn-loader hidden"></span>
      </button>

      <p class="auth-switch">No account? <a href="#" data-switch="register">Create one →</a></p>
    </div>

    <!-- Register Form -->
    <div class="auth-form hidden" id="register-form">
      <div class="form-header">
        <h1>Join RideGo</h1>
        <p>Create your account to get started</p>
      </div>

      <div class="alert" id="register-alert"></div>

      <div class="field">
        <label for="reg-username">Username</label>
        <input type="text" id="reg-username" placeholder="choose_a_username" autocomplete="username" />
      </div>
      <div class="field">
        <label for="reg-password">Password</label>
        <input type="password" id="reg-password" placeholder="••••••••" autocomplete="new-password" />
      </div>
      <div class="field">
        <label>I want to</label>
        <div class="role-toggle">
          <button class="role-btn active" data-role="ROLE_USER">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
              <circle cx="9" cy="6" r="3" stroke="currentColor" stroke-width="1.5"/>
              <path d="M3 15c0-3.314 2.686-6 6-6s6 2.686 6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            Book Rides
          </button>
          <button class="role-btn" data-role="ROLE_DRIVER">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
              <rect x="1" y="7" width="16" height="8" rx="2" stroke="currentColor" stroke-width="1.5"/>
              <path d="M3 7V6a6 6 0 0 1 12 0v1" stroke="currentColor" stroke-width="1.5"/>
              <circle cx="5" cy="13" r="1.5" fill="currentColor"/>
              <circle cx="13" cy="13" r="1.5" fill="currentColor"/>
            </svg>
            Drive & Earn
          </button>
        </div>
      </div>

      <div class="driver-fields hidden" id="driver-fields">
        <div class="field">
          <label for="reg-phone">Phone Number</label>
          <input type="tel" id="reg-phone" placeholder="9876543210" autocomplete="tel" />
        </div>
        <div class="field">
          <label for="reg-vehicle-type">Vehicle Type</label>
          <select id="reg-vehicle-type">
            <option value="">Select vehicle type</option>
            <option value="Sedan">Sedan</option>
            <option value="SUV">SUV</option>
            <option value="Premium">Premium</option>
          </select>
        </div>
        <div class="field">
          <label for="reg-vehicle-name">Vehicle Name</label>
          <input type="text" id="reg-vehicle-name" placeholder="Honda City" />
        </div>
        <div class="field">
          <label for="reg-vehicle-number">Vehicle Number</label>
          <input type="text" id="reg-vehicle-number" placeholder="MP09AB1234" />
        </div>
      </div>

      <button class="btn-primary" id="register-btn">
        <span class="btn-text">Create Account</span>
        <span class="btn-loader hidden"></span>
      </button>

      <p class="auth-switch">Have an account? <a href="#" data-switch="login">Sign in →</a></p>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
