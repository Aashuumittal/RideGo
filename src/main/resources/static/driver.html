<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RideGo — Driver Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
</head>
<body class="dashboard-page driver-theme">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">
        <svg width="22" height="22" viewBox="0 0 28 28" fill="none">
          <circle cx="14" cy="14" r="13" stroke="currentColor" stroke-width="2"/>
          <path d="M8 18 L14 8 L20 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="14" cy="18" r="2" fill="currentColor"/>
        </svg>
      </div>
      <span>RideGo</span>
    </div>

    <nav class="sidebar-nav">
      <a href="#" class="nav-item active" data-panel="requests">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="2" y="4" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M5 7h8M5 10h5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Ride Requests
      </a>
      <a href="#" class="nav-item" data-panel="history">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="7" stroke="currentColor" stroke-width="1.5"/><path d="M9 5v4l2.5 2.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Ride History
      </a>
    </nav>

    <div class="sidebar-user">
      <div class="user-avatar driver-avatar" id="user-avatar-sidebar">D</div>
      <div class="user-info">
        <div class="user-name" id="sidebar-username">Loading…</div>
        <div class="user-role-label">Driver</div>
      </div>
      <button class="logout-btn" id="logout-btn" title="Sign out">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 2H3a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h3M10 11l4-4-4-4M14 8H6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
  </aside>

  <!-- Main -->
  <main class="dashboard-main">

    <header class="dash-header">
      <div>
        <h2 class="dash-title" id="panel-title">Ride Requests</h2>
        <p class="dash-subtitle" id="panel-subtitle">Pending rides matching your vehicle type</p>
      </div>
      <div class="header-actions">
        <div class="live-badge">
          <span class="live-dot"></span>
          Live
        </div>
        <button class="refresh-btn" id="refresh-btn" title="Refresh dashboard">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M3 9a6 6 0 1 0 1.5-3.9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M3 4.5V9H7.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>Refresh</span>
        </button>
      </div>
    </header>

    <div class="alert" id="driver-alert"></div>

    <!-- Stats strip -->
    <div class="stats-strip" id="stats-strip">
      <div class="stat-card">
        <div class="stat-value" id="stat-pending">—</div>
        <div class="stat-label">Pending</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-accepted">—</div>
        <div class="stat-label">Accepted</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-completed">—</div>
        <div class="stat-label">Completed</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-earnings">—</div>
        <div class="stat-label">Earnings</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-rating">—</div>
        <div class="stat-label">Rating</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-ratings-count">—</div>
        <div class="stat-label">Ratings</div>
      </div>
    </div>

    <!-- Requests list -->
    <section class="panel" id="panel-requests">
      <div class="rides-list" id="requests-list">
        <div class="loading-state">
          <div class="spinner"></div>
          <p>Fetching ride requests...</p>
        </div>
      </div>
    </section>

    <section class="panel hidden" id="panel-history">
      <div class="rides-list" id="driver-history-list">
        <div class="loading-state">
          <div class="spinner"></div>
          <p>Loading ride history...</p>
        </div>
      </div>
    </section>

  </main>

  <script src="js/api.js"></script>
  <script src="js/driver-dashboard.js"></script>
</body>
</html>
